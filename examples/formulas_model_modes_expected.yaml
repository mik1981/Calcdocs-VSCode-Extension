# formulas_model_modes_expected.yaml
# ══════════════════════════════════════════════════════════════════════════════
# Reference file for CalcDocs tolerance propagation (three-level model).
#
# THREE LEVELS — always kept separate:
#
#   Level 1  uncertainty  : how wide is the input variation band
#                           (percent | range | absolute | sigma)
#   Level 2  distribution : how the value is distributed inside that band
#                           (uniform | normal | triangular)
#   Level 3  propagation  : which bound is reported on the OUTPUT formula
#                           (worst_case | rss | monte_carlo)
#
# propagation is declared on the OUTPUT formula, never on the input constant.
#
# All three propagation methods use REAL Monte Carlo sampling (N=10 000 default).
# "propagation" only selects which bound is shown:
#   worst_case   → absolute min/max of samples  (100% coverage)
#   rss          → mean ± 3·σ of output samples (~99.7% if output ≈ normal)
#   monte_carlo  → confidence percentiles        (default: 95 % → p2.5/p97.5)
#
# The Distribution tab shows the SAME empirical histogram for all three methods.
# Only the confidence bound markers change.
# ══════════════════════════════════════════════════════════════════════════════


# ════════════════════════════════════════════════════════════════════════════
# 1. INPUT DECLARATIONS  (Level 1 + Level 2 only — no propagation here)
# ════════════════════════════════════════════════════════════════════════════

# ── 1a. Uniform ±5 %  ───────────────────────────────────────────────────────
# Monte Carlo: N samples drawn uniformly from [95, 105]
# halfWidth = 5,  σ_uniform = 5/√3 ≈ 2.887
X_UNIFORM:
  type: const
  value: 100
  unit: count
  uncertainty:
    type: percent
    value: 5
  distribution:
    type: uniform
  # Distribution tab: flat histogram, [95, 105]

# ── 1b. Normal ±5 % at ±3σ  ─────────────────────────────────────────────────
# Monte Carlo: N samples drawn from N(100, σ=5/3≈1.667)
# halfWidth = 5,  σ_normal = 5/3 ≈ 1.667
X_NORMAL_3S:
  type: const
  value: 100
  unit: count
  uncertainty:
    type: percent
    value: 5
  distribution:
    type: normal
    sigma_level: 3
  # Distribution tab: bell-shaped histogram, narrow (σ≈1.667)

# ── 1c. Normal ±5 % at ±2σ  ─────────────────────────────────────────────────
# Monte Carlo: N samples drawn from N(100, σ=5/2=2.5)
# halfWidth = 5,  σ_normal = 5/2 = 2.5
X_NORMAL_2S:
  type: const
  value: 100
  unit: count
  uncertainty:
    type: percent
    value: 5
  distribution:
    type: normal
    sigma_level: 2
  # Distribution tab: bell-shaped histogram, wider than X_NORMAL_3S

# ── 1d. Absolute range  ──────────────────────────────────────────────────────
# halfWidth = (108-92)/2 = 8,  σ_uniform = 8/√3 ≈ 4.619
X_RANGE_ASYM:
  type: const
  value: 100
  unit: count
  uncertainty:
    type: range
    min: 92
    max: 108
  distribution:
    type: uniform
  # Distribution tab: flat histogram, wider than X_UNIFORM

# ── 1e. Absolute uncertainty  ────────────────────────────────────────────────
# halfWidth = 3,  σ_uniform = 3/√3 = √3 ≈ 1.732
X_ABS:
  type: const
  value: 100
  unit: count
  uncertainty:
    type: absolute
    absolute: 3
  distribution:
    type: uniform
  # Distribution tab: flat histogram [97, 103]

# ── 1f. Direct sigma  ────────────────────────────────────────────────────────
# σ = 1.5,  3σ range = [95.5, 104.5]
X_SIGMA:
  type: const
  value: 100
  unit: count
  uncertainty:
    type: sigma
    sigma: 1.5
  distribution:
    type: normal
    sigma_level: 3
  # Distribution tab: bell-shaped, σ=1.5


# ════════════════════════════════════════════════════════════════════════════
# 2. LINEAR FORMULA: Y = X  (single input, all methods)
# ════════════════════════════════════════════════════════════════════════════
# For f(x) = x:  output distribution = input distribution
# All three methods should agree on shape; bounds differ.

# worst_case: reports absolute min/max → [95, 105]
Y_linear_wc:
  type: expr
  formula: X_UNIFORM
  unit: count
  propagation: worst_case
  # Distribution tab: flat histogram (uniform input passthrough)
  # Reported bounds: [95, 105]  (= dist.min / dist.max of samples)
  expected:
    value: 100
    min: 95
    max: 105

# rss: reports mean ± 3σ of the output samples
# X_UNIFORM σ=2.887 → output σ≈2.887 → bounds = 100 ± 3×2.887 ≈ [91.34, 108.66]
# NOTE: rss bounds are WIDER than worst_case here because 3σ for a uniform
#       distribution exceeds the actual half-width. This is expected and correct.
Y_linear_rss_uniform:
  type: expr
  formula: X_UNIFORM
  unit: count
  propagation: rss
  # Distribution tab: flat histogram (identical to worst_case), different bound markers
  # Reported bounds: ~[91.3, 108.7]
  expected:
    value: 100
    min_approx: 91.3
    max_approx: 108.7
    note: "rss on uniform input gives WIDER bounds than worst_case — this is correct"

# rss on normal input: output σ = input σ = 2.5 → bounds = 100 ± 7.5
Y_linear_rss_normal2s:
  type: expr
  formula: X_NORMAL_2S
  unit: count
  propagation: rss
  # Distribution tab: bell-shaped histogram
  # Reported bounds: ~[92.5, 107.5]
  expected:
    value: 100
    min: 92.5
    max: 107.5

# monte_carlo: reports p2.5 and p97.5 confidence bounds
Y_linear_mc_uniform:
  type: expr
  formula: X_UNIFORM
  unit: count
  propagation: monte_carlo
  confidence: 95
  seed: 42
  # Distribution tab: flat histogram; bound markers at ~p2.5/p97.5
  # For uniform [95,105]: p2.5 ≈ 95.25, p97.5 ≈ 104.75
  expected:
    value: 100
    min_approx: 95.2
    max_approx: 104.8
    note: "MC confidence bounds are INSIDE the full [95,105] range"

Y_linear_mc_normal:
  type: expr
  formula: X_NORMAL_3S
  unit: count
  propagation: monte_carlo
  confidence: 95
  seed: 42
  # Normal σ=1.667: p2.5 ≈ 96.73, p97.5 ≈ 103.27
  expected:
    value: 100
    min_approx: 96.7
    max_approx: 103.3


# ════════════════════════════════════════════════════════════════════════════
# 3. NON-LINEAR FORMULA: Y = X²  (asymmetric output distribution)
# ════════════════════════════════════════════════════════════════════════════
# f(x) = x²: output is NOT symmetric even for symmetric input.
# f(95) = 9025, f(100) = 10000, f(105) = 11025
# upEffect   = f(105) − f(100) = +1025
# downEffect = f(95)  − f(100) =  −975
# → output distribution has positive skewness

Y_nonlinear_wc:
  type: expr
  formula: X_UNIFORM * X_UNIFORM
  unit: count
  propagation: worst_case
  # worst_case reports absolute extremes → [9025, 11025]
  # Distribution tab: right-skewed histogram (more mass on lower side)
  expected:
    value: 10000
    min: 9025
    max: 11025

Y_nonlinear_rss_uniform:
  type: expr
  formula: X_UNIFORM * X_UNIFORM
  unit: count
  propagation: rss
  # dfdx = (f(105)-f(95))/(2×5) = 200;  σ_x = 5/√3 ≈ 2.887
  # σ_y = 200 × 2.887 ≈ 577;  bounds = 10000 ± 3×577 ≈ [8269, 11731]
  # Distribution tab: SAME right-skewed shape as worst_case, different bound markers
  expected:
    value: 10000
    min_approx: 8269
    max_approx: 11731

Y_nonlinear_mc:
  type: expr
  formula: X_UNIFORM * X_UNIFORM
  unit: count
  propagation: monte_carlo
  confidence: 95
  seed: 42
  # p2.5 ≈ 9030, p97.5 ≈ 11020 (slightly inside the absolute [9025, 11025])
  # Distribution tab: real asymmetric histogram visible
  expected:
    value_approx: 10008    # E[X²] = Var(X) + E[X]² = 25/3 + 10000 ≈ 10008
    min_approx: 9030
    max_approx: 11020

Y_nonlinear_rss_normal:
  type: expr
  formula: X_NORMAL_2S * X_NORMAL_2S
  unit: count
  propagation: rss
  # σ_x = 5/2 = 2.5;  dfdx = 200;  σ_y = 200×2.5 = 500
  # bounds = 10000 ± 3×500 = [8500, 11500]
  expected:
    value: 10000
    min: 8500
    max: 11500


# ════════════════════════════════════════════════════════════════════════════
# 4. TWO INPUTS: Y = A + B  (different distributions)
# ════════════════════════════════════════════════════════════════════════════
# nominal = 100 + 100 = 200

Y_two_wc:
  type: expr
  formula: X_UNIFORM + X_NORMAL_2S
  unit: count
  propagation: worst_case
  # hw(X_UNIFORM)=5, hw(X_NORMAL_2S)=5 → Δ_wc = 5+5 = 10 → [190, 210]
  expected:
    value: 200
    min: 190
    max: 210

Y_two_rss:
  type: expr
  formula: X_UNIFORM + X_NORMAL_2S
  unit: count
  propagation: rss
  # σ(X_UNIFORM)=5/√3≈2.887, σ(X_NORMAL_2S)=5/2=2.5
  # σ_y = √(2.887²+2.5²) = √(8.33+6.25) = √14.58 ≈ 3.819
  # bounds = 200 ± 3×3.819 ≈ [188.54, 211.46]
  expected:
    value: 200
    min_approx: 188.5
    max_approx: 211.5

Y_two_mc:
  type: expr
  formula: X_UNIFORM + X_NORMAL_2S
  unit: count
  propagation: monte_carlo
  confidence: 95
  seed: 42
  # Convolution uniform+normal → approximately normal (CLT)
  # p2.5 ≈ 192.5, p97.5 ≈ 207.5
  expected:
    value_approx: 200
    min_approx: 192
    max_approx: 208


# ════════════════════════════════════════════════════════════════════════════
# 5. SIX INPUTS: all distribution types mixed
# ════════════════════════════════════════════════════════════════════════════
# nominal = 600

A_UNIF_1:
  type: const
  value: 100
  unit: count
  uncertainty: { type: percent, value: 5 }
  distribution: { type: uniform }

A_UNIF_2:
  type: const
  value: 100
  unit: count
  uncertainty: { type: percent, value: 5 }
  distribution: { type: uniform }

A_NORM_2S_1:
  type: const
  value: 100
  unit: count
  uncertainty: { type: percent, value: 5 }
  distribution: { type: normal, sigma_level: 2 }

A_NORM_2S_2:
  type: const
  value: 100
  unit: count
  uncertainty: { type: percent, value: 5 }
  distribution: { type: normal, sigma_level: 2 }

A_NORM_3S_1:
  type: const
  value: 100
  unit: count
  uncertainty: { type: percent, value: 5 }
  distribution: { type: normal, sigma_level: 3 }

A_NORM_3S_2:
  type: const
  value: 100
  unit: count
  uncertainty: { type: percent, value: 5 }
  distribution: { type: normal, sigma_level: 3 }

Y_total_wc:
  type: expr
  formula: A_UNIF_1 + A_UNIF_2 + A_NORM_2S_1 + A_NORM_2S_2 + A_NORM_3S_1 + A_NORM_3S_2
  unit: count
  propagation: worst_case
  # Δ_wc = 5×6 = 30 → [570, 630]
  expected:
    value: 600
    min: 570
    max: 630

Y_total_rss:
  type: expr
  formula: A_UNIF_1 + A_UNIF_2 + A_NORM_2S_1 + A_NORM_2S_2 + A_NORM_3S_1 + A_NORM_3S_2
  unit: count
  propagation: rss
  # σ_i: 2.887, 2.887, 2.5, 2.5, 1.667, 1.667
  # Σσ² = 8.33+8.33+6.25+6.25+2.78+2.78 = 34.72  → σ_y = √34.72 ≈ 5.892
  # bounds = 600 ± 3×5.892 ≈ [582.3, 617.7]
  expected:
    value: 600
    min_approx: 582
    max_approx: 618
    note: "CLT: 6 independent inputs → output nearly Gaussian, rss is accurate"

Y_total_mc:
  type: expr
  formula: A_UNIF_1 + A_UNIF_2 + A_NORM_2S_1 + A_NORM_2S_2 + A_NORM_3S_1 + A_NORM_3S_2
  unit: count
  propagation: monte_carlo
  confidence: 95
  seed: 42
  # CLT: p2.5 ≈ 600 - 1.96×5.892 ≈ 588.5,  p97.5 ≈ 611.5
  expected:
    value_approx: 600
    min_approx: 588
    max_approx: 612


# ════════════════════════════════════════════════════════════════════════════
# 6. PARAMETER_TOLERANCES OVERRIDE
# ════════════════════════════════════════════════════════════════════════════
# Assign or override tolerance for a specific dependency without modifying
# the dependency's own declaration.

BASE_200:
  type: const
  value: 200
  unit: count
  # No uncertainty declared on BASE_200 itself

Y_with_override:
  type: expr
  formula: BASE_200 * BASE_200
  unit: count
  propagation: worst_case
  parameter_tolerances:
    BASE_200:
      uncertainty:
        type: percent
        value: 5              # injected only for this formula's propagation
      distribution:
        type: uniform
  # BASE_200=200, hw=10
  # f(210)=44100, f(190)=36100, f(200)=40000
  # upEffect=+4100, downEffect=−3900  (asymmetric: X² is non-linear)
  # worst_case: [36100, 44100]
  expected:
    value: 40000
    min: 36100
    max: 44100


# ════════════════════════════════════════════════════════════════════════════
# 7. LEGACY FORMAT  (accepted with WARN diagnostics)
# ════════════════════════════════════════════════════════════════════════════
# These fields are converted internally to the three-level model.
# Prefer the explicit format for new work.

X_LEGACY_TOL:
  type: const
  value: 100
  unit: count
  tol: 5
  # WARN: converted to uncertainty:{type:percent,value:5} + distribution:{type:uniform}
  # Distribution tab: flat histogram [95, 105]

X_LEGACY_GAUSSIAN:
  type: const
  value: 100
  unit: count
  tol: 5
  tol_mode: gaussian
  sigma: 2
  # WARN: converted to uncertainty:{type:percent,value:5}
  #                  + distribution:{type:normal,sigma_level:2}
  # Distribution tab: bell-shaped histogram, σ=2.5

Y_legacy_wc:
  type: expr
  formula: X_LEGACY_TOL
  unit: count
  propagation: worst_case
  expected:
    value: 100
    min: 95
    max: 105

Y_legacy_rss:
  type: expr
  formula: X_LEGACY_GAUSSIAN
  unit: count
  propagation: rss
  # X_LEGACY_GAUSSIAN → normal σ=2.5 → bounds = 100 ± 3×2.5 = [92.5, 107.5]
  expected:
    value: 100
    min: 92.5
    max: 107.5
