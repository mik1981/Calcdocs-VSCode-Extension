# Case 21: Probabilistic edge cases
# Questo esempio mostra comportamenti controintuitivi delle distribuzioni in Monte Carlo.

AA:
  value: 100
  unit: count
  uncertainty:
    type: percent
    value: 20
  distribution:
    type: uniform

BB:
  value: 100
  unit: count
  uncertainty:
    type: percent
    value: 5
  distribution:
    type: uniform

SUM_UNIFORM:
  formula: AA + BB
  unit: count
  propagation: monte_carlo

SQUARE_UNIFORM:
  formula: AA * AA
  unit: count
  propagation: monte_carlo

CC:
  value: 100
  unit: count
  uncertainty:
    type: percent
    value: 5
  distribution:
    type: normal
    sigma_level: 2

DD:
  value: 100
  unit: count
  uncertainty:
    type: percent
    value: 5
  distribution:
    type: triangular

MIXED_DIST:
  formula: CC + AA + DD
  unit: count
  propagation: monte_carlo

EE:
  value: 0.1
  unit: count
  uncertainty:
    type: range
    min: 0.01
    max: 0.19
  distribution:
    type: uniform

DIVISION_NEAR_ZERO:
  formula: AA / EE
  unit: count
  propagation: monte_carlo
